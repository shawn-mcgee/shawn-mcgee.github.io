          <div class="flex flex-row flex-wrap gap-1">

    &lt;head&gt;
      &lt;link href=&#34;/assets/css/style.css&#34; rel=&#34;stylesheet&#34; /&gt;
      &lt;script src=&#34;https://unpkg.com/phosphor-icons&#34;&gt;&lt;/script&gt;

    &lt;article class=&#34;prose&#34;&gt;
      &lt;p&gt;I have spent the last few months in somewhat of a developer crisis.&lt;/p&gt;
&lt;p&gt;I began programming in middle school when I checked out a book on ActionScript
from the library and obtained a free trial of AdobeFlash to experiment with.&lt;/p&gt;
&lt;p&gt;In order to become a web developer, one must become a
&lt;a href=&#34;https://www.dictionary.com/browse/polyglot&#34;&gt;Polyglot&lt;/a&gt; Programmer.&lt;/p&gt;
&lt;p&gt;The internet is overflowing with developer videos, blogs, and tutorials that
promise the quickest, easiest, most elegant, most correct way of solving
problems or achieving success. In my experience, I find there exist truly
useful insights, but to gather each into your arms like the dime-a-dozen
dandelions they are does not a problem solve.&lt;/p&gt;
&lt;p&gt;That is to say, each insight is a valuable tool in its own regard, but&lt;/p&gt;
&lt;p&gt;That is to say, the true work of a developer is solving problems&lt;/p&gt;
&lt;p&gt;In order to be a web developer one must become a Polyglot Programmer, because
the web itself exists within an undulating, multilingual liminal space.
Browsers, Bundlers, Compilers, and Transpilers alike play a roll in TheStack.&lt;/p&gt;
&lt;p&gt;Languages like C, C++, C#, Go, Dart, Flutter, HTML, JS, CSS&lt;/p&gt;
&lt;p&gt;I have tried (and failed) to use other static site generators like
&lt;a href=&#34;https://jekyllrb.com/&#34;&gt;Jekyll&lt;/a&gt; and &lt;a href=&#34;https://gohugo.io/&#34;&gt;Hugo&lt;/a&gt;.&lt;/p&gt;
&lt;h3&gt;Getting Started&lt;/h3&gt;
&lt;p&gt;I&#39;m going to assume some degree of familiarity with Node.js&lt;/p&gt;
&lt;pre class=&#34;language-powershell&#34;&gt;&lt;code class=&#34;language-powershell&#34;&gt;npm install &lt;span class=&#34;token operator&#34;&gt;-&lt;/span&gt;D @11ty/eleventy&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;Let&#39;s start with&lt;/p&gt;
&lt;p&gt;&lt;em&gt;index.md:&lt;/em&gt;&lt;/p&gt;
&lt;pre class=&#34;language-md&#34;&gt;&lt;code class=&#34;language-md&#34;&gt;This is a file&lt;/code&gt;&lt;/pre&gt;
&lt;h3&gt;Adding Syntax Highlighting with Prism.js&lt;/h3&gt;
&lt;p&gt;As a developer it is
Eleventy provides an official plugin&lt;/p&gt;
&lt;h3&gt;Adding Tailwind Style and Typography&lt;/h3&gt;
&lt;pre class=&#34;language-powershell&#34;&gt;&lt;code class=&#34;language-powershell&#34;&gt;npm install &lt;span class=&#34;token operator&#34;&gt;-&lt;/span&gt;D tailwindcss @tailwindcss/typography&lt;/code&gt;&lt;/pre&gt;
&lt;pre class=&#34;language-powershell&#34;&gt;&lt;code class=&#34;language-powershell&#34;&gt;npx tailwindcss init&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;em&gt;tailwind.config.js:&lt;/em&gt;&lt;/p&gt;
&lt;pre class=&#34;language-js&#34;&gt;&lt;code class=&#34;language-js&#34;&gt;&lt;span class=&#34;token comment&#34;&gt;/** @type {import(&#39;tailwindcss&#39;).Config} */&lt;/span&gt;&lt;br&gt;module&lt;span class=&#34;token punctuation&#34;&gt;.&lt;/span&gt;exports &lt;span class=&#34;token operator&#34;&gt;=&lt;/span&gt; &lt;span class=&#34;token punctuation&#34;&gt;{&lt;/span&gt;&lt;br&gt;  &lt;span class=&#34;token comment&#34;&gt;// This regular expression targets &lt;/span&gt;&lt;br&gt;  &lt;span class=&#34;token literal-property property&#34;&gt;content&lt;/span&gt;&lt;span class=&#34;token operator&#34;&gt;:&lt;/span&gt; &lt;span class=&#34;token punctuation&#34;&gt;[&lt;/span&gt;&lt;span class=&#34;token string&#34;&gt;&#34;/_site/**/*.{html,js}&#34;&lt;/span&gt;&lt;span class=&#34;token punctuation&#34;&gt;]&lt;/span&gt;&lt;span class=&#34;token punctuation&#34;&gt;,&lt;/span&gt;&lt;br&gt;  &lt;span class=&#34;token literal-property property&#34;&gt;theme&lt;/span&gt;&lt;span class=&#34;token operator&#34;&gt;:&lt;/span&gt; &lt;span class=&#34;token punctuation&#34;&gt;{&lt;/span&gt; &lt;span class=&#34;token punctuation&#34;&gt;}&lt;/span&gt;&lt;span class=&#34;token punctuation&#34;&gt;,&lt;/span&gt;&lt;br&gt;  &lt;span class=&#34;token literal-property property&#34;&gt;plugins&lt;/span&gt;&lt;span class=&#34;token operator&#34;&gt;:&lt;/span&gt; &lt;span class=&#34;token punctuation&#34;&gt;[&lt;/span&gt;&lt;br&gt;    &lt;span class=&#34;token function&#34;&gt;require&lt;/span&gt;&lt;span class=&#34;token punctuation&#34;&gt;(&lt;/span&gt;&lt;span class=&#34;token string&#34;&gt;&#39;@tailwindcss/typography&#39;&lt;/span&gt;&lt;span class=&#34;token punctuation&#34;&gt;)&lt;/span&gt;&lt;span class=&#34;token punctuation&#34;&gt;,&lt;/span&gt;&lt;br&gt;  &lt;span class=&#34;token punctuation&#34;&gt;]&lt;/span&gt;&lt;span class=&#34;token punctuation&#34;&gt;,&lt;/span&gt;&lt;br&gt;&lt;span class=&#34;token punctuation&#34;&gt;}&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;em&gt;package.json:&lt;/em&gt;&lt;/p&gt;
&lt;pre class=&#34;language-json&#34;&gt;&lt;code class=&#34;language-json&#34;&gt;&lt;span class=&#34;token punctuation&#34;&gt;{&lt;/span&gt;&lt;br&gt;  &lt;span class=&#34;token property&#34;&gt;&#34;script&#34;&lt;/span&gt;&lt;span class=&#34;token operator&#34;&gt;:&lt;/span&gt; &lt;span class=&#34;token punctuation&#34;&gt;{&lt;/span&gt;&lt;br&gt;    &lt;span class=&#34;token property&#34;&gt;&#34;build&#34;&lt;/span&gt;&lt;span class=&#34;token operator&#34;&gt;:&lt;/span&gt; &lt;span class=&#34;token string&#34;&gt;&#34;eleventy &amp;amp;&amp;amp; tailwindcss -i _site/style.css -o _site/style.css&#34;&lt;/span&gt;&lt;br&gt;  &lt;span class=&#34;token punctuation&#34;&gt;}&lt;/span&gt;&lt;br&gt;&lt;span class=&#34;token punctuation&#34;&gt;}&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;em&gt;eleventy.js:&lt;/em&gt;&lt;/p&gt;
&lt;pre class=&#34;language-js&#34;&gt;&lt;code class=&#34;language-js&#34;&gt;module&lt;span class=&#34;token punctuation&#34;&gt;.&lt;/span&gt;&lt;span class=&#34;token function-variable function&#34;&gt;exports&lt;/span&gt; &lt;span class=&#34;token operator&#34;&gt;=&lt;/span&gt; &lt;span class=&#34;token keyword&#34;&gt;function&lt;/span&gt;&lt;span class=&#34;token punctuation&#34;&gt;(&lt;/span&gt;&lt;span class=&#34;token parameter&#34;&gt;eleventyConfig&lt;/span&gt;&lt;span class=&#34;token punctuation&#34;&gt;)&lt;/span&gt; &lt;span class=&#34;token punctuation&#34;&gt;{&lt;/span&gt;&lt;br&gt;  eleventyConfig&lt;span class=&#34;token punctuation&#34;&gt;.&lt;/span&gt;&lt;span class=&#34;token function&#34;&gt;addPassthroughCopy&lt;/span&gt;&lt;span class=&#34;token punctuation&#34;&gt;(&lt;/span&gt;&lt;span class=&#34;token string&#34;&gt;&#34;./**/*.css&#34;&lt;/span&gt;&lt;span class=&#34;token punctuation&#34;&gt;)&lt;/span&gt;&lt;br&gt;&lt;span class=&#34;token punctuation&#34;&gt;}&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;

    &lt;/article&gt;"></iframe>

      &lt;h3&gt;Hello World!&lt;/h3&gt;
&lt;p&gt;This is a test post! The content of which is written in markdown and then
consumed by &lt;a href=&#34;https://11ty.dev&#34;&gt;eleventy.js&lt;/a&gt; to generate the page you are reading!&lt;/p&gt;
&lt;p&gt;(take a look)&lt;/p&gt;
&lt;pre class=&#34;language-markdown&#34;&gt;&lt;code class=&#34;language-markdown&#34;&gt;&lt;span class=&#34;token comment&#34;&gt;&amp;lt;!-- This section contains metadata about the post, written in YAML --&gt;&lt;/span&gt;&lt;br&gt;&lt;span class=&#34;token hr punctuation&#34;&gt;---&lt;/span&gt;&lt;br&gt;title: Hello World&lt;br&gt;date: &#34;2023-01-17&#34;&lt;br&gt;author: Shawn McGee&lt;br&gt;&lt;span class=&#34;token title important&#34;&gt;layout: layouts/post&lt;br&gt;&lt;span class=&#34;token punctuation&#34;&gt;---&lt;/span&gt;&lt;/span&gt;&lt;br&gt;&lt;br&gt;&lt;span class=&#34;token title important&#34;&gt;&lt;span class=&#34;token punctuation&#34;&gt;###&lt;/span&gt; Hello World!&lt;/span&gt;&lt;br&gt;&lt;br&gt;This is a test post! The content of which is written in markdown and then &lt;br&gt;consumed by &lt;span class=&#34;token url&#34;&gt;[&lt;span class=&#34;token content&#34;&gt;eleventy.js&lt;/span&gt;](&lt;span class=&#34;token url&#34;&gt;https://11ty.dev&lt;/span&gt;)&lt;/span&gt; to generate the page you are reading!&lt;br&gt;&lt;br&gt;(take a look)&lt;br&gt;&lt;br&gt;...&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;I have opted to style this blog using the infamous
&lt;a href=&#34;https://tailwindcss.com&#34;&gt;tailwindcss&lt;/a&gt; along with
&lt;a href=&#34;https://prismjs.com/&#34;&gt;prism.js&lt;/a&gt; for syntax highlighting.&lt;/p&gt;
&lt;p&gt;In honor of those programmers who came before me I offer a simple rendition of
&lt;code&gt;Hello World&lt;/code&gt; written in the language with which I first fell in love.&lt;/p&gt;
&lt;pre class=&#34;language-java&#34;&gt;&lt;code class=&#34;language-java&#34;&gt;&lt;span class=&#34;token keyword&#34;&gt;public&lt;/span&gt; &lt;span class=&#34;token keyword&#34;&gt;class&lt;/span&gt; &lt;span class=&#34;token class-name&#34;&gt;HelloWorld&lt;/span&gt; &lt;span class=&#34;token punctuation&#34;&gt;{&lt;/span&gt;&lt;br&gt;  &lt;span class=&#34;token keyword&#34;&gt;public&lt;/span&gt; &lt;span class=&#34;token keyword&#34;&gt;static&lt;/span&gt; &lt;span class=&#34;token keyword&#34;&gt;void&lt;/span&gt; &lt;span class=&#34;token function&#34;&gt;main&lt;/span&gt;&lt;span class=&#34;token punctuation&#34;&gt;(&lt;/span&gt;&lt;span class=&#34;token class-name&#34;&gt;String&lt;/span&gt;&lt;span class=&#34;token punctuation&#34;&gt;[&lt;/span&gt;&lt;span class=&#34;token punctuation&#34;&gt;]&lt;/span&gt; args&lt;span class=&#34;token punctuation&#34;&gt;)&lt;/span&gt; &lt;span class=&#34;token punctuation&#34;&gt;{&lt;/span&gt;&lt;br&gt;    &lt;span class=&#34;token class-name&#34;&gt;System&lt;/span&gt;&lt;span class=&#34;token punctuation&#34;&gt;.&lt;/span&gt;out&lt;span class=&#34;token punctuation&#34;&gt;.&lt;/span&gt;&lt;span class=&#34;token function&#34;&gt;println&lt;/span&gt;&lt;span class=&#34;token punctuation&#34;&gt;(&lt;/span&gt;&lt;span class=&#34;token string&#34;&gt;&#34;Hello World!&#34;&lt;/span&gt;&lt;span class=&#34;token punctuation&#34;&gt;)&lt;/span&gt;&lt;br&gt;  &lt;span class=&#34;token punctuation&#34;&gt;}&lt;/span&gt;&lt;br&gt;&lt;span class=&#34;token punctuation&#34;&gt;}&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
