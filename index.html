<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <link rel="stylesheet" href="/assets/css/style.css">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shawn McGee</title>
  </head>
  <body class="bg-pink-900">
    <div class="flex flex-col h-screen justify-center items-center gap-2">
      <img
        src="/assets/png/profile.png"
        alt="A Smiling Kaiju in a neon tsunami, digital art."
        class="w-32 h-32 rounded-full border-2 border-pink-300 shadow-xl" />
      <span class="text-center text-4xl sm:text-6xl font-serif font-bold text-white">Shawn McGee</span>
      <span class="text-center text-md  sm:text-xl  font-serif           text-white">Full-Time Dad, Part-Time DM, Some-Time Programmer.</span>
      <div class="flex flex-row flex-wrap gap-2 justify-center w-11/12 max-w-lg">
        <a
          title="Posts"
          href="#posts"
          class="basis-1/5 grow flex flex-row justify-center items-center gap-1 rounded bg-pink-300 p-2 hover:bg-pink-200 hover:drop-shadow-xl">
          Posts
        </a>
        <a
          title="GitHub"
          href="https://github.com/shawn-mcgee"
          class="basis-1/5 grow flex flex-row justify-center items-center gap-1 rounded bg-pink-300 p-2 hover:bg-pink-200 hover:drop-shadow-xl">
          <img
            src="/assets/svg/github-white.svg"
            alt="GitHub Logo"
            class="invert w-4 h-4">
          GitHub
        </a>
        <a
          title="Itch.io"
          href="https://tinycthulu.itch.io"
          class="basis-1/5 grow flex flex-row justify-center items-center gap-1 rounded bg-pink-300 p-2 hover:bg-pink-200 hover:drop-shadow-xl">
          <img
            src="/assets/svg/itchio-white.svg"
            alt="Itch.io Logo"
            class="invert w-4" />
          Itch.io
        </a>
        <a
          title="About"
          href="/about/"
          class="basis-1/5 grow flex flex-row justify-center items-center gap-1 rounded bg-pink-300 p-2 hover:bg-pink-200 hover:drop-shadow-xl">
          About
        </a>
      </div>
    </div>

    <a id="posts"></a>
    
    <div class="flex flex-col items-center gap-2">
      
    </div>

  </body>
</html>
