
<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="/asset/css/style.css" rel="stylesheet" />
    <script src="https://unpkg.com/phosphor-icons"></script>

    <title>Making a Static Blog with Eleventy.js</title>
  </head>

  <body class="bg-pink-900">
    <div class="container mx-auto grid grid-flow-row justify-center">
      <div class="h-12"></div>
      <div class="flex flex-col gap-1">
        <span class="text-3xl font-mono font-bold text-white">Making a Static Blog with Eleventy.js</span>
        <div>
          <div class="flex flex-row gap-1 float-left text-sm font-sans text-pink-300">
            <span class="text-sm font-sans text-pink-300">Shawn McGee</span>/
            <span class="text-sm font-sans text-pink-300">2023-01-18</span>
          </div>
          
          <div class="flex flex-row gap-1 float-right">
            
              <div class="flex flex-row border rounded-full border-pink-300 px-2 place-content-center">
                <span class="text-sm font-mono text-pink-300">#11ty</span>
              </div>
            
              <div class="flex flex-row border rounded-full border-pink-300 px-2 place-content-center">
                <span class="text-sm font-mono text-pink-300">#Eleventy</span>
              </div>
            
          </div>
        </div>
        <div class="h-6"></div>
        <div class="flex flex-col rounded p-4 bg-pink-200 place-content-center">
          <article class="w-full prose prose-md">
            <p>Coming Soon!!</p>

          </article>
        </div>
      </div>
      <div class="h-2"></div>
      <div class="grid grid-flow-col grid-cols-2 justify-center gap-4">
        
        

        <a
          href="/posts/2023-01-17/hello-world/"
          title="Previous Post"
          class="flex flex-row rounded justify-start bg-pink-300 shadow-2xl p-2 gap-1 place-items-center hover:bg-pink-200 hover:drop-shadow-2xl">
          <i class="ph-arrow-left float-left text-2xl font-bold"></i>
        </a>

        <a
          href=""
          title="Next Post"
          class="flex flex-row rounded justify-end bg-pink-300 shadow-2xl p-2 gap-1 place-items-center hover:bg-pink-200 hover:drop-shadow-2xl">
          <i class="ph-arrow-right text-2xl font-bold"></i>
        </a>


      </div>
      <div class="h-12"></div>


    </div>
  </body>
