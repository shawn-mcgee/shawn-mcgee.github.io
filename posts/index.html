    &lt;article class=&#34;prose prose-sm prose-code:before:content-none prose-code:after:content-none&#34;&gt;
      &lt;h3&gt;&lt;em&gt;From Humble Beginnings&lt;/em&gt;&lt;/h3&gt;
&lt;p&gt;The first TTRPG I ever had the opportunity of playing was Pathfinder. I was in highschool, a new kid had just moved in next door, his cousin was a burgeoning TTRPG nerd, and my brother and I were invited to join his Pathfinder campaign. This was the early 2010&#39;s and while the &lt;em&gt;Satanic Panic&lt;/em&gt; had more or less passed us by, I still remember there was plenty of pearl clutching on the part of my parents who were ultimately convinced to let us play because &lt;em&gt;&amp;quot;It wasn&#39;t Dungeons &amp;amp; Dragons.&amp;quot;&lt;/em&gt;&lt;/p&gt;
&lt;p&gt;There were many nights where we lost track of time enchanted by a world that was unfolding before our very eyes, only for the fantasy to evaporate as a loud knock came from the door. After breaking curfew in this way a few times my brother and I were banned from future Pathfinder sessions, but that did very little to sate our ravenous curiosity.&lt;/p&gt;
&lt;p&gt;The seeds of &lt;em&gt;sin and debauchery&lt;/em&gt; had been planted and we have been avid TTRPG fans ever since.&lt;/p&gt;
&lt;h3&gt;&lt;em&gt;To Meager Middles&lt;/em&gt;&lt;/h3&gt;
&lt;p&gt;Fast forward to 2020. I was working as a clerk at a major grocery retailer and I had made a few friends. Discussion around videogames and TTRPGs was vibrant and made work bearable, which inevitably developed into a weekly &lt;em&gt;Dungeons &amp;amp; Dragons 5th Edition&lt;/em&gt; campaign of which I was at the helm. After arduously organizing and preparing everything, news of the novel coronavirus COVID-19 and the subsequent pandemic that followed obliterated any opportunity to meet in-person.&lt;/p&gt;
&lt;p&gt;So we pivoted.&lt;/p&gt;
&lt;p&gt;We began meeting online. I setup up a Discord server and hosted our campaign on Roll20. For us, Roll20 was somehow simultaneously &lt;em&gt;the best and the worst&lt;/em&gt; option available. Being a free, browser-based VTT meant that no one had to purchase a subscription, download a large executable, or use an expensive computer. And Roll20&#39;s built-in character sheets made the physical to digital transition so much easier for many of my players.&lt;/p&gt;
&lt;p&gt;However.&lt;/p&gt;
&lt;h3&gt;&lt;em&gt;We Can Do Better&lt;/em&gt;&lt;/h3&gt;
&lt;p&gt;Despite having the lowest buy-in of any VTT we could find at the time, the user experience was desperately lacking. During peak hours the service would fail to load, players would lose connection, and interactions like dice rolls would take tens of seconds to resolve. If it wasn&#39;t server issues we were experiencing it was client issues. Clunky controls and an interface that was unintuitive and difficult to navigate regularly made our sessions unnecessarily frustrating or confusing. Despite this, our ultimate disappointment was in the loss of the tactile, in-person experience. Something about moving miniatures and rolling dice in-person just couldn&#39;t be emulated by the flat nature of Roll20.&lt;/p&gt;
&lt;p&gt;For quite some time since I have held the opinion that a Virtual Tabletop cannot provide an experience as rich as a physical TTRPG. In 2022, I was proven wrong when I purchased a little VTT called TaleSpire. The tilt-shift lens, the excellent assets, and the realization of a virtual tabletop in stunning 3D was enchanting. It was this moment that something inside of me changed. Roll20 has a special place in my heart for being the place we could go when the world shutdown, but now I know we can do better.&lt;/p&gt;
&lt;p&gt;Thats why I was inspired to begin work on a little project I am calling &lt;em&gt;&amp;quot;Alchemy - A Virtual Tabletop for the Modern Era.&amp;quot;&lt;/em&gt;&lt;/p&gt;
&lt;h3&gt;&lt;em&gt;A Virtual Tabletop for the Modern Era&lt;/em&gt;&lt;/h3&gt;
&lt;p&gt;First and foremost I believe that 3D is the future of the virtual tabletop. I don&#39;t intend on abandoning the wealth of 2D assets already available to players, but I do see these assets being enhanced by a 3D environment in the form of &amp;quot;cardboard&amp;quot;.&lt;/p&gt;
&lt;p&gt;Second, computing power is cheaper and more abundant than it ever has been, yet online services are increasingly centralized. I see a serverless, peer-to-peer future for the virtual tabletop that empowers players to connect and play on their own terms, free from the demands of ever more aggressive &amp;quot;live services&amp;quot;. I don&#39;t believe that servers are completely out of the question, but I would like to reclaim some of the freedom and privacy benefits that come from a peer-to-peer system.&lt;/p&gt;
&lt;p&gt;Third, I have briefly sung the praises of TaleSpire and I adore the amazing work coming from the talented team at Bouncyrock Entertainment, but at the end of the day they are running a studio and they have to make money to keep the lights on. The literal dollar cost of TaleSpire or other VTT solutions can be difficult for a TTRPG group to swallow. It&#39;s often better if a single member of a group can pay for a shared license, but I want to reduce friction for players and DMs alike by completely eliminating this barrier.&lt;/p&gt;
